name: Desktop Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          {
            echo 'body<<CHANGELOG_EOF'
            echo "## What's Changed"
            echo ""

            # Collect commits by category
            FEATS=$(git log "$RANGE" --pretty="format:- %s (%h)" --grep="^feat" 2>/dev/null || true)
            FIXES=$(git log "$RANGE" --pretty="format:- %s (%h)" --grep="^fix" 2>/dev/null || true)
            REFACTORS=$(git log "$RANGE" --pretty="format:- %s (%h)" --grep="^refactor" 2>/dev/null || true)
            OTHERS=$(git log "$RANGE" --pretty="format:- %s (%h)" --invert-grep --grep="^feat" --grep="^fix" --grep="^refactor" --grep="^docs" --grep="^ci" --grep="^chore" --grep="^test" 2>/dev/null || true)

            if [ -n "$FEATS" ]; then
              echo "### Features"
              echo "$FEATS"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### Fixes"
              echo "$FIXES"
              echo ""
            fi
            if [ -n "$REFACTORS" ]; then
              echo "### Refactor"
              echo "$REFACTORS"
              echo ""
            fi
            if [ -n "$OTHERS" ]; then
              echo "### Others"
              echo "$OTHERS"
              echo ""
            fi

            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
            fi
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes "${{ steps.changelog.outputs.body }}" \
            --repo "${{ github.repository }}"

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            go_os: darwin
            go_arch: arm64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            go_os: windows
            go_arch: amd64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing version to $VERSION"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' package.json > tmp2.json && mv tmp2.json package.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build Go sidecar
        shell: bash
        env:
          GOOS: ${{ matrix.go_os }}
          GOARCH: ${{ matrix.go_arch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "${{ matrix.go_os }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o src-tauri/binaries/agent-usage-${{ matrix.target }}${EXT} .

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri
        with:
          args: --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Artifact paths: $ARTIFACT_PATHS"
          # Use noglob to prevent bash from interpreting spaces/special chars in paths
          set -o noglob
          echo "$ARTIFACT_PATHS" | jq -r '.[]' | while IFS= read -r f; do
            # Convert Windows backslash paths to forward slashes for Git Bash
            f="${f//\\//}"
            if [ ! -e "$f" ]; then
              echo "Warning: $f does not exist, skipping"
              continue
            fi
            echo "Uploading $f"
            gh release upload "$TAG" "$f" --clobber || true
          done
          set +o noglob
