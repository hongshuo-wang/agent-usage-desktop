name: Desktop Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            go_os: darwin
            go_arch: arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            go_os: darwin
            go_arch: amd64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            go_os: linux
            go_arch: amd64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            go_os: windows
            go_arch: amd64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing version to $VERSION"
          # Update tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          # Update package.json (use jq to avoid npm dependency resolution)
          jq --arg v "$VERSION" '.version = $v' package.json > tmp2.json && mv tmp2.json package.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build Go sidecar
        shell: bash
        env:
          GOOS: ${{ matrix.go_os }}
          GOARCH: ${{ matrix.go_arch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "${{ matrix.go_os }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o src-tauri/binaries/agent-usage-${{ matrix.target }}${EXT} .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Wait for release to be created by GoReleaser (up to 10 min)
          for i in $(seq 1 60); do
            if gh release view "$TAG" &>/dev/null; then
              echo "Release $TAG found"
              break
            fi
            echo "Waiting for release $TAG... ($i/60)"
            sleep 10
          done
          # Upload all Tauri artifacts
          for f in ${{ steps.tauri.outputs.artifactPaths }}; do
            gh release upload "$TAG" "$f" --clobber || true
          done
